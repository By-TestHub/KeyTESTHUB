<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTHUB Premium Script</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap');

        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Kanit', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        @keyframes rainbow {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            20% { border-color: #ff8800; box-shadow: 0 0 15px #ff8800; }
            40% { border-color: #ffff00; box-shadow: 0 0 15px #ffff00; }
            60% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            80% { border-color: #0088ff; box-shadow: 0 0 15px #0088ff; }
            100% { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        }

        @keyframes rainbow-text {
            0% { color: #ff0000; }
            20% { color: #ff8800; }
            40% { color: #ffff00; }
            60% { color: #00ff00; }
            80% { color: #0088ff; }
            100% { color: #ff00ff; }
        }

        .shop-card { 
            background: #1a1a1a; 
            padding: 35px; 
            border-radius: 25px; 
            border: 3px solid #ffd700; 
            text-align: center; 
            width: 340px; 
            animation: rainbow 5s linear infinite; 
        }
        
        .price-tag { 
            font-size: 50px; 
            font-weight: bold; 
            margin: 10px 0 0 0; 
            animation: rainbow-text 5s linear infinite; 
        }

        .sub-price {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: rainbow-text 5s linear infinite;
        }
        
        .buy-instruction { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #444; }
        .text-info { font-size: 14px; color: #bbb; line-height: 1.6; margin: 0; }
        
        .btn-discord { 
            background-color: #5865F2; 
            color: #fff; 
            text-decoration: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            margin-top: 15px; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); 
        }
        .btn-discord:hover { background-color: #4752c4; transform: translateY(-3px); }
        
        .discord-icon {
            width: 26px;
            height: 26px;
            fill: #ffffff; 
        }
        
        .footer-text { font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="shop-card">
        <h1 style="font-size: 24px; margin-bottom: 5px; animation: rainbow-text 5s linear infinite;">Premium Script</h1>
        
        <div class="price-tag">10 THB</div>
        <div class="sub-price">(รับแค่ซองอังเปา)</div>
        
        <div class="buy-instruction">
            <p class="text-info">
                หากคุณต้องการซื้อกดที่ปุ่มด้านล่างเพื่อ <br>
                <strong>"เข้าร่วม Discord"</strong> <br>
                และส่งข้อความที่ห้อง <strong>#ซื้อคีย์ซื้อสคริป</strong><br>
                <strong>"ส่งข้อความก่อนหากส่งลิงก์อังเปาเลยอาจเสียเงินอีก"</strong> <br>
                <strong>"ลิงก์อังเปาเลยอาจเสียเงินอีก"</strong> <br>
            </p>
        </div>

        <a href="https://discord.gg/ccvCxMMMC6" target="_blank" class="btn-discord">
            <svg class="discord-icon" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.87,56.6.54,80.21a105.73,105.73,0,0,0,32.17,16.15,77.7,77.7,0,0,0,6.89-11.11,67.63,67.63,0,0,1-10.82-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a67.88,67.88,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14C129.63,50.45,124.54,26.85,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5.12-12.67,11.41-12.67S54,46,53.86,53,48.74,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.12-12.67,11.41-12.67S96.08,46,95.93,53,90.76,65.69,82.69,65.69Z"/>
            </svg>
            เข้าร่วม Discord
        </a>
        <p class="footer-text">หลังจากนั้นโปรดรอแอดมินตอบกลับในแชทส่วนตัว</p>
    </div>

</body>
</html>
